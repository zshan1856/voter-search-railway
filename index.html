<!DOCTYPE html>
<html>
<head>
  <title>Voter Search</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body { font-family: -apple-system; margin:0; background:#f7f7f7; }

    .header {
      position: sticky;
      top: 0;
      background: white;
      padding: 14px 12px;
      border-bottom: 1px solid #eee;
      z-index: 10;
    }

    .container { max-width:700px; margin:auto; padding:0 12px; }

    h2 { margin-bottom: 10px; }

    input {
      width:100%;
      padding:12px;
      margin:8px 0;
      border-radius:10px;
      border:1px solid #ddd;
      font-size:16px;
    }

    button {
      padding:12px;
      border:none;
      border-radius:10px;
      cursor:pointer;
      font-size:14px;
    }

    .btn-row { display:flex; gap:10px; margin-top:6px; }
    .search-btn { background:black; color:white; flex:1; }
    .cancel-btn { background:red; color:white; flex:1; }
    .filter-btn { background:#1976d2; color:white; width:100%; margin-top:10px; }

    .results { padding:12px; }

    .result {
      background:white;
      padding:16px;
      border-radius:12px;
      margin-bottom:12px;
      border:1px solid #eee;
      line-height:1.6;
    }

    .highlight { background:#ffe082; }

    #loader { display:none; margin-top:6px; }

    .filter-box {
      display:none;
      padding:12px;
      background:#fafafa;
      border:1px solid #ddd;
      border-radius:10px;
      margin-top:12px;
    }

    .footer-tag {
      position: fixed;
      bottom: 10px;
      left: 12px;
      font-size: 12px; /* 🔥 increased */
      font-style: italic;
      color: #5a0f0f;
      opacity: 0.7;
      transition: opacity 0.3s ease;
    }

    .footer-hidden { opacity:0; }
  </style>
</head>

<body>

<div class="header">
<div class="container">

<h2>Kausa Mumbra Voter Search</h2>

<!-- ✅ PDF DOWNLOAD BUTTON -->
<a href="https://drive.google.com/uc?export=download&id=1qwCIJ4ERVkUSm_k0-4hk-92eHRWSV5Tg" target="_blank">
  <button style="width:100%; margin-bottom:10px;">Download Full Voter List (PDF)</button>
</a>

<input id="surname" placeholder="Surname">
<input id="firstname" placeholder="First Name">

<div class="btn-row">
  <button class="search-btn" onclick="search()">Search</button>
  <button class="cancel-btn" onclick="cancelSearch()">Cancel</button>
</div>

<button class="filter-btn" id="filterBtn" onclick="toggleFilter()" style="display:none;">
  Filters
</button>

<p id="status"></p>
<p id="loader">🔍 Searching...</p>

<div class="filter-box" id="filterBox">
  <input id="houseFilter" placeholder="House No">
  <input id="ageFilter" placeholder="Age">
  <div class="btn-row">
    <button onclick="applyFilter()">Apply</button>
    <button onclick="clearFilter()">Clear</button>
  </div>
</div>

</div>
</div>

<div class="results container" id="results"></div>

<div class="footer-tag" id="footerTag">
  Developed by Zeeshan Hasan
</div>

<script>

let controller;
let originalResults = [];
let scrollTimeout;

function escapeRegex(text) {
    return text.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
}

function highlight(text, q) {
    if (!q) return text;
    let regex = new RegExp(escapeRegex(q), "gi");
    return text.replace(regex, m => `<span class="highlight">${m}</span>`);
}

async function search() {

    // ✅ RESET FILTERS ON NEW SEARCH
    document.getElementById("filterBox").style.display = "none";
    document.getElementById("filterBtn").style.display = "none";
    document.getElementById("houseFilter").value = "";
    document.getElementById("ageFilter").value = "";
    document.getElementById("status").innerText = "";

    document.getElementById("loader").style.display = "block";

    let surname = document.getElementById("surname").value.trim();
    let firstname = document.getElementById("firstname").value.trim();

    controller = new AbortController();

    let url = `/search?surname=${encodeURIComponent(surname)}&firstname=${encodeURIComponent(firstname)}`;

    let res = await fetch(url);
    let data = await res.json();

    originalResults = data.results || [];

    document.getElementById("status").innerText = `Found ${originalResults.length} results`;

    if (originalResults.length > 0) {
        document.getElementById("filterBtn").style.display = "block";
    }

    render(originalResults);

    document.getElementById("loader").style.display = "none";
}

function cancelSearch() {
    if (controller) controller.abort();
}

function render(data) {

    let resultsDiv = document.getElementById("results");
    resultsDiv.innerHTML = "";

    let surname = document.getElementById("surname").value.trim();
    let firstname = document.getElementById("firstname").value.trim();

    data.forEach(r => {

        let name = highlight(r.name || "", surname);
        name = highlight(name, firstname);

        let div = document.createElement("div");

        div.innerHTML = `
            <div class="result">
                <b>${name}</b><br>
                Relative: ${r.relative_name || ""}<br>
                House: ${r.house_no} | Age: ${r.age}
            </div>
        `;

        resultsDiv.appendChild(div);
    });
}

function toggleFilter() {
    let box = document.getElementById("filterBox");
    box.style.display = box.style.display === "none" ? "block" : "none";
}

function applyFilter() {

    let house = document.getElementById("houseFilter").value.trim();
    let age = document.getElementById("ageFilter").value.trim();

    let filtered = originalResults;

    if (house) filtered = filtered.filter(r => r.house_no == house);
    if (age) filtered = filtered.filter(r => r.age == age);

    document.getElementById("status").innerText = `Filtered: ${filtered.length} results`;

    render(filtered);
}

function clearFilter() {
    document.getElementById("houseFilter").value = "";
    document.getElementById("ageFilter").value = "";
    document.getElementById("status").innerText = `Found ${originalResults.length} results`;
    render(originalResults);
}

// 🔥 Hide footer on scroll
window.addEventListener("scroll", function() {
    let tag = document.getElementById("footerTag");
    tag.classList.add("footer-hidden");

    clearTimeout(scrollTimeout);
    scrollTimeout = setTimeout(() => {
        tag.classList.remove("footer-hidden");
    }, 800);
});

</script>

</body>
</html>
